<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lista de Reproducción</title>

    <link rel="stylesheet" href="css/playlist.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div id="particles-js"></div>

    <!-- SIDEBAR -->

    <div class="side-bar">

        <div>

            <h1 class="logo">VIBES</h1>

            <div class="menu">

                <a href="home.html">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                </a>

                <a href="search.html">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </a>

                <a href="library.html">
                    <i class="fa-solid fa-book"></i>
                    Biblioteca
                </a>

            </div>

        </div>

        <div class="bottom-section">

            <button class="genres-btn">
                Tus Géneros Top
            </button>

            <div class="bottom-menu">

                <a href="#">
                    <i class="fa-solid fa-gear"></i>
                    Ajustes
                </a>

                <a href="#">
                    <i class="fa-solid fa-circle-question"></i>
                    Soporte
                </a>

            </div>

        </div>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOP BAR -->

        <div class="top-bar">

            <div class="top-links">

                <a href="#">Descubrir</a>

                <a href="#">Novedades</a>

                <a href="#">En Vivo</a>

            </div>

            <div class="top-right">

                <button class="upgrade-btn">
                    Premium
                </button>

                <i class="fa-regular fa-bell"></i>

                <i class="fa-regular fa-circle-user"></i>

            </div>

        </div>

        <!-- PLAYLIST HEADER -->

        <div class="playlist-header">

            <img
                class="playlist-cover"
                id="playlist-cover"
                src="https://picsum.photos/500?88"
            >

            <div class="playlist-info">

                <p class="playlist-tag">
                    LISTA DE REPRODUCCIÓN
                </p>

                <h1 id="playlist-title">Título de la Lista</h1>

                <p class="playlist-description" id="playlist-desc">
                    Camino compilado según tus preferencias de audio neuronal.
                </p>

                <div class="playlist-meta" id="playlist-meta">

                    <span>VIBES</span>

                    <span>•</span>

                    <span id="playlist-song-count">0 canciones</span>

                </div>

                <div class="playlist-actions">

                    <button class="play-all-btn" id="playlist-play-btn" style="cursor: pointer;">

                        <i class="fa-solid fa-play"></i>

                        Reproducir

                    </button>

                </div>

            </div>

        </div>

        <!-- SONG LIST -->

        <div class="song-list">

            <!-- HEADER -->

            <div class="song-list-header">

                <span>#</span>

                <span>TÍTULO</span>

                <span>GÉNERO</span>

                <span>ESTADO (MOOD)</span>

            </div>

            <!-- SONGS CONTAINER -->
            <div id="songs-container">
                <!-- Se inyecta dinámicamente -->
            </div>

        </div>

    </div>

    <!-- PLAYER -->

    <div class="music-player">

        <!-- LEFT -->

        <a href="player.html" class="song-info">

            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=100&auto=format&fit=crop">

            <div>

                <h4>Ninguna sonando</h4>

                <p>VIBES</p>

            </div>

            <i class="fa-regular fa-heart"></i>

        </a>

        <!-- CENTER -->

        <div class="player-controls">

            <i class="fa-solid fa-shuffle"></i>

            <i class="fa-solid fa-backward"></i>

            <button class="play-btn">

                <i class="fa-solid fa-play"></i>

            </button>

            <i class="fa-solid fa-forward"></i>

            <i class="fa-solid fa-repeat"></i>

        </div>

        <!-- RIGHT -->

        <div class="song-time">

            <i class="fa-solid fa-computer"></i>

            <span>2:14</span>

            <div class="progress-bar">

                <div class="progress"></div>

            </div>

            <span>5:42</span>

            <i class="fa-solid fa-volume-high"></i>

            <div class="volume-bar">

                <div class="volume-progress"></div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/player_controller.js"></script>
    <script src="js/playlist.js"></script>
</body>
</html>
