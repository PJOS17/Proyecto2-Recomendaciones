<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Biblioteca</title>

    <link rel="stylesheet" href="css/library.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div id="particles-js"></div>

    <!-- SIDEBAR -->

    <div class="side-bar">

        <div>

            <h1 class="logo">VIBES</h1>

            <div class="menu">

                <a href="home.html">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                </a>

                <a href="search.html">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </a>

                <a class="active" href="library.html">
                    <i class="fa-solid fa-book"></i>
                    Biblioteca
                </a>

            </div>

        </div>

        <div class="bottom-section">

            <button class="genres-btn" style="cursor: pointer;">
                Tus Géneros Top
            </button>

            <div class="bottom-menu">

                <a href="#" id="settings-btn">
                    <i class="fa-solid fa-gear"></i>
                    Ajustes
                </a>

                <a href="#">
                    <i class="fa-solid fa-circle-question"></i>
                    Soporte
                </a>

            </div>

        </div>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOP BAR -->

        <div class="top-bar">

            <div class="top-links">

                <a href="#">Descubrir</a>

                <a href="#">Novedades</a>

                <a href="#">En Vivo</a>

            </div>

            <div class="top-right">

                <button class="upgrade-btn">
                    Premium
                </button>

                <i class="fa-regular fa-bell"></i>

                <i class="fa-regular fa-circle-user"></i>

            </div>

        </div>

        <!-- LIBRARY HEADER -->

        <div class="library-header">

            <div class="library-left">

                <img
                    class="profile-image"
                    src="https://picsum.photos/300?88"
                >

                <div class="library-info">

                    <p class="library-tag">
                        TU BIBLIOTECA
                    </p>

                    <h1 id="library-username">Alex_Vibes</h1>

                    <div class="library-stats" id="library-stats">

                        <span>0 Listas</span>

                    </div>

                </div>

            </div>

            <div class="library-actions">

                <button class="play-all-btn" id="shuffle-play-btn" style="cursor: pointer;">

                    <i class="fa-solid fa-shuffle"></i>

                    Rep. Aleatoria

                </button>

                <button class="dots-btn" id="create-playlist-btn" title="Crear Lista" style="background: #1f1f1f; border-radius: 50%; color: #39FF14; border: 1px solid #39FF14; cursor: pointer; display: flex; justify-content: center; align-items: center; width: 48px; height: 48px;">

                    <i class="fa-solid fa-plus"></i>

                </button>

            </div>

        </div>

        <!-- FILTERS -->

        <div class="library-filters">

            <button class="filter-active">
                Todo
            </button>

            <button>Listas</button>

            <button>Álbumes</button>

            <button>Artistas</button>

            <button>Descargas</button>

        </div>

        <!-- LIBRARY GRID -->

        <div class="library-grid" id="playlists-grid">
            <!-- Cargado dinámicamente -->
        </div>

        <!-- MODAL CREACIÓN PLAYLIST -->
        <div id="playlist-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;">
            <div style="background: #0d0d0d; border: 1px solid #39FF14; border-radius: 20px; padding: 30px; width: 400px; box-shadow: 0 0 30px rgba(57,255,20,0.25);">
                <h3 id="modal-title" style="color: #39FF14; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Compilar Nueva Lista</h3>
                
                <p style="color: #9a9a9a; font-size: 13px; margin-bottom: 8px;">Título de la Lista</p>
                <input type="text" id="playlist-name-input" placeholder="Ingresa el título de la lista..." style="width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; margin-bottom: 20px; outline: none; font-size: 14px; font-family: inherit;">
                
                <p style="color: #9a9a9a; font-size: 13px; margin-bottom: 8px;">URL de Portada de Imagen (Opcional)</p>
                <input type="text" id="playlist-cover-input" placeholder="URL de la imagen..." style="width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: white; padding: 12px; margin-bottom: 20px; outline: none; font-size: 14px; font-family: inherit;">
                
                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button id="close-modal-btn" style="background: transparent; border: 1px solid #555; color: white; padding: 10px 18px; border-radius: 8px; cursor: pointer;">Cancelar</button>
                    <button id="save-playlist-btn" style="background: #39FF14; border: none; color: black; font-weight: bold; padding: 10px 22px; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px rgba(57,255,20,0.3);">Compilar</button>
                </div>
            </div>
        </div>

    </div>

    <!-- PLAYER -->

    <div class="music-player">

        <!-- LEFT -->

        <a href="player.html" class="song-info">

            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=100&auto=format&fit=crop">

            <div>

                <h4>Ninguna sonando</h4>

                <p>VIBES</p>

            </div>

            <i class="fa-regular fa-heart"></i>

        </a>

        <!-- CENTER -->

        <div class="player-controls">

            <i class="fa-solid fa-shuffle"></i>

            <i class="fa-solid fa-backward"></i>

            <button class="play-btn">

                <i class="fa-solid fa-play"></i>

            </button>

            <i class="fa-solid fa-forward"></i>

            <i class="fa-solid fa-repeat"></i>

        </div>

        <!-- RIGHT -->

        <div class="song-time">

            <i class="fa-solid fa-computer"></i>

            <span>2:14</span>

            <div class="progress-bar">

                <div class="progress"></div>

            </div>

            <span>5:42</span>

            <i class="fa-solid fa-volume-high"></i>

            <div class="volume-bar">

                <div class="volume-progress"></div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/player_controller.js"></script>
    <script src="js/library.js"></script>
</body>
</html>
