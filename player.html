<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reproductor</title>

    <link rel="stylesheet" href="css/player.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div id="particles-js"></div>

    <!-- SIDEBAR -->

    <div class="side-bar">

        <div>

            <h1 class="logo">VIBES</h1>

            <div class="menu">

                <a href="home.html">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                </a>

                <a href="search.html">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </a>

                <a href="library.html">
                    <i class="fa-solid fa-book"></i>
                    Biblioteca
                </a>

            </div>

        </div>

        <div class="bottom-section">

            <button class="genres-btn">
                Tus Géneros Top
            </button>

            <div class="bottom-menu">

                <a href="#">
                    <i class="fa-solid fa-gear"></i>
                    Ajustes
                </a>

                <a href="#">
                    <i class="fa-solid fa-circle-question"></i>
                    Soporte
                </a>

            </div>

        </div>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <!-- TOP BAR -->

        <div class="top-bar">

            <div class="top-links">

                <a href="#">Reproduciendo</a>

                <a href="#">Espectro</a>

                <a href="#">Cola</a>

            </div>

            <div class="top-right">

                <button class="upgrade-btn">
                    Premium
                </button>

                <i class="fa-regular fa-bell"></i>

                <i class="fa-regular fa-circle-user"></i>

            </div>

        </div>

        <!-- PLAYER LAYOUT -->

        <div class="player-layout">

            <!-- LEFT -->

            <div class="album-panel">

                <img
                    class="album-cover"
                    src="https://picsum.photos/700?50"
                >

                <div class="album-info">

                    <h1 id="player-song-title">Ninguna sonando</h1>

                <h3 id="player-song-artist">VIBES</h3>

                <!-- ACTIONS -->

                <div class="song-actions">

                    <button class="action-btn">

                        <i class="fa-regular fa-heart"></i>

                        Guardar

                    </button>

                    <button class="action-btn">

                        <i class="fa-solid fa-share"></i>

                        Compartir

                    </button>

                    </div>

                </div>

                <!-- CONTROLS -->

                <div class="player-controls">

                    <i class="fa-solid fa-shuffle"></i>

                    <i class="fa-solid fa-backward"></i>

                    <button class="play-btn">

                        <i class="fa-solid fa-play"></i>

                    </button>

                    <i class="fa-solid fa-forward"></i>

                    <i class="fa-solid fa-repeat"></i>

                </div>

                <!-- PROGRESS -->

                <div class="player-progress">

                    <span>2:14</span>

                    <div class="progress-bar">

                        <div class="progress"></div>

                    </div>

                    <span>5:42</span>

                </div>

                <!-- VOLUME -->

                <div class="volume-section">

                    <i class="fa-solid fa-volume-high"></i>

                    <div class="volume-bar">

                        <div class="volume-progress"></div>

                    </div>

                </div>

            </div>

            <div class="lyrics-panel">

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2 style="margin: 0; font-size: 18px; font-weight: bold; letter-spacing: 1px;">ESPECTRO Y LETRA NEURONAL</h2>
                    <button id="translate-lyrics-btn" style="background: transparent; border: 1px solid #39FF14; color: #39FF14; font-family: inherit; font-size: 11px; font-weight: bold; text-transform: uppercase; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(57,255,20,0.15); display: flex; align-items: center; gap: 6px;">
                        <i class="fa-solid fa-language"></i> Traducir al Español
                    </button>
                </div>

                <div class="lyrics-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; border-radius: 10px; overflow: hidden; border: 1px dashed #39FF14; padding: 20px; height: calc(100% - 65px); position: relative;">
                    <canvas id="audio-visualizer" style="width: 100%; height: 100%; display: block; position: absolute; top: 0; left: 0; opacity: 0.45; z-index: 1;"></canvas>
                    <div id="player-lyrics-box" style="z-index: 2; width: 100%; display: flex; flex-direction: column; gap: 12px; text-align: center; overflow-y: auto; max-height: 80%; padding: 10px; font-family: inherit;">
                        <!-- Letras inyectadas dinámicamente -->
                    </div>
                </div>

            </div>

            <!-- RIGHT -->

            <div class="queue-panel">

                <h2>SIGUIENTE EN COLA</h2>

                <div class="queue-list" id="queue-container">
                    <!-- Se inyecta dinámicamente -->
                </div>

                </div>

                <!-- INSIGHTS -->

                <div class="insights-panel">

                    <h3>Análisis Neuronal</h3>

                    <p>
                        La reproducción actual muestra una alta convergencia armónica y resonancia emocional.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/player_controller.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
